<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --red: #E50914;
  --red2: #ff1a1a;
  --red-dim: rgba(229,9,20,.15);
  --gold: #f5c518;
  --green: #46d369;
  --bg: #0e0e0e;
  --bg2: #181818;
  --bg3: #242424;
  --bg4: #2e2e2e;
  --glass: rgba(255,255,255,.04);
  --border: rgba(255,255,255,.08);
  --text: #fff;
  --text2: #c8c8c8;
  --text3: #888;
  --nav-h: 64px;
  --r: 6px;
  --r2: 12px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  overflow-x: hidden;
  min-height: 100vh;
}
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

/* ── PAGES ── */
.page { display: none; min-height: 100vh; }
.page.active { display: block; }

/* ── NAV ── */
#nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 900;
  height: var(--nav-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 4%;
  transition: background .4s, box-shadow .4s;
}
#nav.solid {
  background: rgba(14,14,14,.97);
  box-shadow: 0 1px 0 var(--border);
  backdrop-filter: blur(12px);
}
#nav.transparent {
  background: linear-gradient(to bottom, rgba(0,0,0,.8) 0%, transparent 100%);
}
.nav-l { display: flex; align-items: center; gap: 2.5rem; }
.nav-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem; letter-spacing: .06em;
  color: var(--red); cursor: pointer; user-select: none;
}
.nav-logo span { color: var(--text); }
.nav-links { display: flex; gap: .1rem; }
.nl {
  background: none; border: none; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: .72rem;
  font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
  color: var(--text3); padding: .45rem .85rem;
  border-radius: var(--r); transition: color .2s, background .2s;
}
.nl:hover { color: var(--text2); }
.nl.active { color: var(--text); background: rgba(255,255,255,.06); }
.nav-r { display: flex; align-items: center; gap: .8rem; }
.nav-icon-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text3); padding: .5rem;
  border-radius: 50%; transition: color .2s, background .2s;
  display: flex; align-items: center; justify-content: center;
}
.nav-icon-btn:hover { color: var(--text); background: var(--glass); }

/* ── BILLBOARD ── */
#bb {
  position: relative; width: 100%;
  height: 92vh; min-height: 560px;
  display: flex; align-items: flex-end;
  padding: 0 4% 6%;
  overflow: hidden;
}
.bb-bg { position: absolute; inset: 0; }
#bbImg {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center 20%;
  transition: opacity .6s ease;
}
.bb-vignette {
  position: absolute; inset: 0;
  background:
    linear-gradient(to top, var(--bg) 0%, rgba(14,14,14,.6) 40%, transparent 70%),
    linear-gradient(to right, rgba(14,14,14,.9) 0%, transparent 55%);
}
.bb-content { position: relative; z-index: 2; max-width: 560px; }
.bb-badge {
  display: inline-flex; align-items: center; gap: .6rem;
  font-size: .6rem; font-weight: 700; letter-spacing: .2em;
  text-transform: uppercase; color: var(--red);
  margin-bottom: 1rem;
}
.bb-badge::before { content:''; width:24px; height:2px; background:var(--red); }
.bb-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.8rem, 6vw, 5rem);
  letter-spacing: .03em; line-height: .95;
  margin-bottom: 1rem;
  text-shadow: 0 4px 40px rgba(0,0,0,.6);
}
.bb-pills {
  display: flex; align-items: center; gap: .6rem;
  margin-bottom: 1rem; flex-wrap: wrap;
}
.bb-pill {
  font-size: .65rem; font-weight: 600; letter-spacing: .06em;
  padding: .25rem .7rem; border-radius: 2px;
  border: 1px solid rgba(255,255,255,.2); color: var(--text2);
}
.bb-pill.match { color: var(--green); border-color: var(--green); }
.bb-pill.imdb { color: var(--gold); border-color: var(--gold); }
.bb-desc {
  font-size: .92rem; line-height: 1.7;
  color: var(--text2); margin-bottom: 1.8rem;
  max-width: 460px;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.bb-actions { display: flex; gap: .8rem; align-items: center; }
.bb-btn {
  display: flex; align-items: center; gap: .6rem;
  padding: .75rem 2rem; border-radius: var(--r);
  font-family: 'DM Sans', sans-serif; font-size: .85rem; font-weight: 600;
  cursor: pointer; transition: all .2s; border: none; letter-spacing: .02em;
}
.bb-btn.primary { background: var(--text); color: #000; }
.bb-btn.primary:hover { background: rgba(255,255,255,.85); transform: scale(1.02); }
.bb-btn.secondary { background: rgba(255,255,255,.12); color: var(--text); backdrop-filter: blur(8px); border: 1px solid var(--border); }
.bb-btn.secondary:hover { background: rgba(255,255,255,.2); }

/* ── ROWS ── */
.rows-wrap { padding: 0 0 6rem; margin-top: -4rem; position: relative; z-index: 10; }
.row { margin-bottom: 3rem; }
.row-hdr {
  padding: 0 4%; margin-bottom: 1rem;
  display: flex; align-items: center; justify-content: space-between;
}
.row-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.15rem; letter-spacing: .08em; color: var(--text2);
}
.row-title .hl { color: var(--red); }
.row-seeall {
  font-size: .65rem; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: var(--green);
  cursor: pointer; opacity: 0; transition: opacity .2s;
}
.row:hover .row-seeall { opacity: 1; }
.track-wrap { position: relative; padding: .5rem 4%; overflow: hidden; }
.track {
  display: flex; gap: 8px;
  overflow-x: auto; scroll-behavior: smooth;
  scrollbar-width: none; padding-bottom: .5rem;
}
.track::-webkit-scrollbar { display: none; }
.arr {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 40px; height: 90px;
  background: rgba(14,14,14,.85);
  border: none; cursor: pointer; color: var(--text);
  display: flex; align-items: center; justify-content: center;
  z-index: 20; opacity: 0; transition: opacity .2s;
  backdrop-filter: blur(8px);
}
.arr.L { left: 0; border-radius: 0 var(--r) var(--r) 0; }
.arr.R { right: 0; border-radius: var(--r) 0 0 var(--r); }
.track-wrap:hover .arr { opacity: 1; }

/* ── CARD ── */
.card {
  flex: 0 0 auto; width: 200px;
  cursor: pointer; position: relative;
  transition: transform .35s cubic-bezier(.2,0,.2,1), z-index 0s .35s;
  z-index: 1;
}
.card:hover {
  transform: scale(1.38); z-index: 200;
  transition: transform .35s cubic-bezier(.2,0,.2,1), z-index 0s 0s;
}
.card:first-child:hover { transform: scale(1.38) translateX(13%); }
.card:last-child:hover  { transform: scale(1.38) translateX(-13%); }
.card-in {
  border-radius: var(--r); overflow: hidden;
  background: var(--bg3);
  box-shadow: 0 8px 32px rgba(0,0,0,.7);
}
.card-thumb { aspect-ratio: 16/9; overflow: hidden; position: relative; }
.card-thumb img {
  width: 100%; height: 100%; object-fit: cover;
  display: block; transition: transform .35s;
}
.card:hover .card-thumb img { transform: scale(1.06); }
.card-fb {
  position: absolute; inset: 0;
  display: none; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.8rem; color: rgba(255,255,255,.08);
  background: linear-gradient(135deg, #111, #222);
}
.card-fb-tag {
  position: absolute; bottom: 8px; left: 10px;
  font-size: .6rem; font-weight: 700; letter-spacing: .08em;
  color: rgba(255,255,255,.4); text-transform: uppercase;
}
/* Card hover panel */
.card-pop {
  background: var(--bg2);
  padding: .75rem .85rem .85rem;
  display: none;
  border-top: 2px solid var(--red);
}
.card:hover .card-pop { display: block; }
.card-pop-row1 { display: flex; align-items: center; gap: .5rem; margin-bottom: .55rem; }
.cp-play {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--text); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background .15s, transform .15s;
}
.cp-play:hover { background: rgba(255,255,255,.85); transform: scale(1.08); }
.cp-more {
  width: 32px; height: 32px; border-radius: 50%;
  background: transparent; border: 2px solid var(--text3);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; color: var(--text); transition: border-color .15s;
}
.cp-more:hover { border-color: var(--text); }
.cp-add {
  width: 32px; height: 32px; border-radius: 50%;
  background: transparent; border: 2px solid var(--text3);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; color: var(--text); transition: border-color .15s; margin-left: auto;
}
.cp-add:hover { border-color: var(--text); }
.cp-match { font-size: .65rem; font-weight: 700; color: var(--green); }
.card-pop-title { font-size: .75rem; font-weight: 600; margin-bottom: .35rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-pop-tags { display: flex; gap: .35rem; flex-wrap: wrap; }
.cp-tag {
  font-size: .58rem; font-weight: 600; letter-spacing: .04em;
  padding: .15rem .45rem; border-radius: 3px;
  border: 1px solid rgba(255,255,255,.12); color: var(--text3);
}

/* ── DETAIL PAGE ── */
#detail-page { background: var(--bg); }
.dp-hero {
  position: relative;
  height: 70vh; min-height: 460px;
  overflow: hidden;
}
#dpBackdrop {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center 15%;
}
.dp-hero-fade {
  position: absolute; inset: 0;
  background:
    linear-gradient(to top, var(--bg) 0%, rgba(14,14,14,.5) 45%, rgba(14,14,14,.3) 100%),
    linear-gradient(to right, rgba(14,14,14,.8) 0%, transparent 50%);
}
.dp-hero-content {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 0 5% 3rem;
  display: flex; align-items: flex-end; gap: 2.5rem;
}
.dp-poster {
  width: 160px; flex-shrink: 0;
  border-radius: var(--r2); overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,.8);
  border: 1px solid var(--border);
  transform: translateY(30px);
}
.dp-poster img { width: 100%; display: block; }
.dp-poster-fb {
  width: 100%; aspect-ratio: 2/3;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg3);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem; color: rgba(255,255,255,.1);
}
.dp-hero-info { flex: 1; padding-bottom: .5rem; }
.dp-type-badge {
  display: inline-flex; align-items: center; gap: .5rem;
  font-size: .6rem; font-weight: 700; letter-spacing: .18em;
  text-transform: uppercase; color: var(--red); margin-bottom: .8rem;
}
.dp-type-badge::before { content:''; width:18px; height:2px; background:var(--red); }
.dp-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.5rem, 5vw, 4.5rem);
  letter-spacing: .03em; line-height: .95;
  margin-bottom: .9rem;
  text-shadow: 0 2px 20px rgba(0,0,0,.5);
}
.dp-meta-row {
  display: flex; align-items: center; gap: .7rem;
  flex-wrap: wrap; margin-bottom: 1rem;
}
.dp-meta-item { font-size: .75rem; color: var(--text3); }
.dp-meta-item.green { color: var(--green); font-weight: 700; }
.dp-meta-item.gold { color: var(--gold); font-weight: 700; display: flex; align-items: center; gap: .3rem; }
.dp-meta-sep { color: rgba(255,255,255,.2); }
.dp-rating-box {
  display: inline-flex; align-items: center; gap: .3rem;
  padding: .2rem .6rem; border-radius: 3px;
  border: 1px solid rgba(255,255,255,.2);
  font-size: .65rem; font-weight: 700; color: var(--text3);
}
.dp-actions { display: flex; gap: .8rem; flex-wrap: wrap; margin-top: .5rem; }
.dp-btn {
  display: flex; align-items: center; gap: .6rem;
  padding: .7rem 1.8rem; border-radius: var(--r);
  font-family: 'DM Sans', sans-serif; font-size: .83rem; font-weight: 600;
  cursor: pointer; border: none; transition: all .2s;
}
.dp-btn.play { background: var(--text); color: #000; }
.dp-btn.play:hover { background: rgba(255,255,255,.85); transform: scale(1.02); }
.dp-btn.ghost { background: var(--glass); color: var(--text); border: 1px solid var(--border); backdrop-filter: blur(8px); }
.dp-btn.ghost:hover { background: rgba(255,255,255,.1); }
.dp-btn.outline { background: transparent; color: var(--text2); border: 1px solid var(--border); }
.dp-btn.outline:hover { border-color: var(--text3); color: var(--text); }

/* Detail body */
.dp-body { padding: 3.5rem 5% 5rem; }
.dp-grid { display: grid; grid-template-columns: 1fr 320px; gap: 4rem; }
.dp-left {}
.dp-section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem; letter-spacing: .1em; color: var(--text2);
  margin-bottom: 1.2rem; display: flex; align-items: center; gap: .8rem;
}
.dp-section-title::after { content:''; flex:1; height:1px; background:var(--border); }
.dp-desc-full {
  font-size: .95rem; line-height: 1.8;
  color: var(--text2); margin-bottom: 2.5rem;
}
/* Cast */
.cast-grid { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 2.5rem; }
.cast-card {
  width: 90px; cursor: pointer;
  transition: transform .2s;
}
.cast-card:hover { transform: translateY(-4px); }
.cast-avatar {
  width: 90px; height: 90px; border-radius: 50%; overflow: hidden;
  background: var(--bg3); margin-bottom: .5rem;
  border: 2px solid var(--border);
}
.cast-avatar img { width: 100%; height: 100%; object-fit: cover; }
.cast-avatar-fb {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem; color: rgba(255,255,255,.15);
  background: linear-gradient(135deg, var(--bg3), var(--bg4));
}
.cast-name { font-size: .7rem; font-weight: 600; text-align: center; color: var(--text2); }
.cast-role { font-size: .62rem; color: var(--text3); text-align: center; margin-top: .1rem; }

/* Episode list on detail page */
.ep-section { margin-bottom: 2.5rem; }
.season-bar {
  display: flex; gap: .5rem; margin-bottom: 1.2rem; flex-wrap: wrap;
}
.season-pill {
  padding: .35rem .9rem; border-radius: 20px;
  font-size: .7rem; font-weight: 600;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text3); cursor: pointer; transition: all .2s;
}
.season-pill.active {
  background: var(--red-dim); border-color: var(--red); color: var(--red);
}
.ep-cards { display: flex; flex-direction: column; gap: .8rem; }
.ep-card {
  display: flex; align-items: center; gap: 1.2rem;
  padding: 1rem 1.2rem;
  background: var(--bg2); border-radius: var(--r2);
  border: 1px solid var(--border);
  cursor: pointer; transition: background .2s, border-color .2s;
}
.ep-card:hover { background: var(--bg3); border-color: rgba(255,255,255,.14); }
.ep-card.playing { border-color: var(--red); background: rgba(229,9,20,.05); }
.ep-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem; color: var(--bg4);
  min-width: 40px; text-align: center; line-height: 1;
}
.ep-card.playing .ep-num { color: var(--red); }
.ep-thumb {
  width: 110px; height: 62px; border-radius: var(--r);
  overflow: hidden; flex-shrink: 0; background: var(--bg3);
  position: relative;
}
.ep-thumb img { width: 100%; height: 100%; object-fit: cover; }
.ep-thumb-play {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.5); opacity: 0; transition: opacity .2s;
}
.ep-card:hover .ep-thumb-play { opacity: 1; }
.ep-info { flex: 1; min-width: 0; }
.ep-info-title { font-size: .82rem; font-weight: 600; margin-bottom: .25rem; }
.ep-info-meta { font-size: .68rem; color: var(--text3); margin-bottom: .4rem; }
.ep-info-desc {
  font-size: .75rem; color: var(--text3); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.ep-progress { flex-shrink: 0; }
.ep-watched-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
}

/* Sidebar */
.dp-right {}
.dp-info-box {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--r2); padding: 1.5rem;
  margin-bottom: 1.5rem;
}
.dp-info-box h4 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem; letter-spacing: .1em; color: var(--text3);
  margin-bottom: 1rem;
}
.dp-info-row {
  display: flex; justify-content: space-between;
  padding: .6rem 0; border-bottom: 1px solid var(--border);
  font-size: .78rem;
}
.dp-info-row:last-child { border-bottom: none; padding-bottom: 0; }
.dp-info-label { color: var(--text3); }
.dp-info-val { color: var(--text2); font-weight: 500; text-align: right; }
/* Genres tags */
.genre-tags { display: flex; flex-wrap: wrap; gap: .5rem; }
.genre-tag {
  padding: .3rem .8rem; border-radius: 20px;
  font-size: .7rem; font-weight: 600;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text3); cursor: pointer; transition: all .2s;
}
.genre-tag:hover { border-color: var(--red); color: var(--red); }
/* Rating bars */
.rating-display { display: flex; flex-direction: column; gap: .6rem; }
.rating-bar { display: flex; align-items: center; gap: .8rem; }
.rating-label { font-size: .68rem; color: var(--text3); min-width: 55px; }
.rating-track { flex: 1; height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
.rating-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width .8s ease; }
.rating-val { font-size: .68rem; color: var(--text2); font-weight: 600; min-width: 30px; text-align: right; }

/* Related */
.related-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem; }
.rel-card {
  cursor: pointer; border-radius: var(--r);
  overflow: hidden; background: var(--bg3);
  transition: transform .2s;
}
.rel-card:hover { transform: scale(1.03); }
.rel-thumb { aspect-ratio: 16/9; overflow: hidden; }
.rel-thumb img { width: 100%; height: 100%; object-fit: cover; }
.rel-info { padding: .5rem .6rem; }
.rel-title { font-size: .7rem; font-weight: 600; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rel-year { font-size: .62rem; color: var(--text3); margin-top: .1rem; }

/* ── PLAYER PAGE ── */
#player-page { background: #000; min-height: 100vh; display: flex; flex-direction: column; }
.player-topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 900;
  height: var(--nav-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 4%;
  background: linear-gradient(to bottom, rgba(0,0,0,.9), transparent);
}
.player-back {
  display: flex; align-items: center; gap: .7rem;
  background: none; border: none; cursor: pointer;
  color: var(--text2); font-family: 'DM Sans', sans-serif;
  font-size: .82rem; font-weight: 600; letter-spacing: .04em;
  padding: .5rem .8rem; border-radius: var(--r);
  transition: color .2s, background .2s;
}
.player-back:hover { color: var(--text); background: var(--glass); }
.player-title-bar {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem; letter-spacing: .06em; color: var(--text2);
}
.player-main { flex: 1; display: flex; flex-direction: column; }
.player-frame-wrap {
  position: relative; width: 100%;
  padding-top: 56.25%; background: #000;
}
.player-frame-wrap iframe {
  position: absolute; inset: 0;
  width: 100%; height: 100%; border: none;
}
.player-info-panel {
  background: var(--bg); padding: 2rem 5% 4rem;
  display: grid; grid-template-columns: 1fr 360px; gap: 3rem;
}
.pip-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem; letter-spacing: .04em; margin-bottom: .5rem;
}
.pip-meta { display: flex; align-items: center; gap: .7rem; flex-wrap: wrap; margin-bottom: 1rem; }
.pip-meta span { font-size: .75rem; color: var(--text3); }
.pip-meta .green { color: var(--green); font-weight: 700; }
.pip-desc { font-size: .9rem; line-height: 1.75; color: var(--text2); margin-bottom: 1.5rem; }

// ═══════════════════════════════════════
//  REGISTRY
// ═══════════════════════════════════════
var REG = {}, RID = 0;
function reg(item, type) { var k = 'k' + (RID++); REG[k] = {item:item, type:type}; return k; }
function byId(id, list) { return list.filter(function(x){ return x.id === id; })[0] || null; }
function findItem(id) {
  return byId(id, MOVIES) ? {item:byId(id,MOVIES),type:'movie'}
       : byId(id, TV_SHOWS) ? {item:byId(id,TV_SHOWS),type:'tv'}
       : byId(id, ANIME) ? {item:byId(id,ANIME),type:'anime'}
       : null;
}

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
var curSection = 'home', curItem = null, curType = null;
var curEp = null, curSeason = 1, watched = {}, prevPage = 'home';

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
function init() {
  showPage('home-page');
  // Try loading from Cloudflare Worker first
  loadFromCloudflare().then(function(ok) {
    renderBillboard(MOVIES[0], 'movie');
    renderRows();
  });
  window.addEventListener('message', onProgress);
  window.addEventListener('scroll', function() {
    var nav = document.getElementById('nav');
    if (window.scrollY > 60) { nav.className = 'solid'; }
    else { nav.className = 'transparent'; }
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeSearch();
  });
}

// ═══════════════════════════════════════
//  PAGE ROUTER
// ═══════════════════════════════════════
function showPage(id) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
  var nav = document.getElementById('nav');
  nav.className = (id === 'home-page') ? 'transparent' : 'solid';
}

function goHome() {
  showPage('home-page');
  setSection('home', document.querySelector('.nl'));
}

// ═══════════════════════════════════════
//  BILLBOARD
// ═══════════════════════════════════════
function renderBillboard(item, type) {
  var img = document.getElementById('bbImg');
  img.src = IB + item.backdrop;
  img.alt = item.title;
  img.style.display = 'block';
  var k = reg(item, type);
  var label = (type==='movie'||item.isMovie) ? 'Featured Film' : type==='tv' ? 'Top Series' : 'Anime Pick';
  var pills = '<span class="bb-pill match">'+item.match+'% Match</span>'
    + '<span class="bb-pill imdb">★ '+item.imdb+'</span>'
    + '<span class="bb-pill">'+item.year+'</span>'
    + '<span class="bb-pill">'+item.rating+'</span>'
    + '<span class="bb-pill">'+item.genre+'</span>';
  document.getElementById('bbContent').innerHTML =
    '<div class="bb-badge">'+label+'</div>'+
    '<div class="bb-title">'+item.title+'</div>'+
    '<div class="bb-pills">'+pills+'</div>'+
    '<div class="bb-desc">'+item.desc+'</div>'+
    '<div class="bb-actions">'+
      '<button class="bb-btn primary" onclick="openPlayer(\''+k+'\',null,null)"><svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>Play Now</button>'+
      '<button class="bb-btn secondary" onclick="openDetail(\''+k+'\')"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>More Info</button>'+
    '</div>';
}

// ═══════════════════════════════════════
//  ROWS
// ═══════════════════════════════════════
function renderRows() {
  var rows = [
    {label:'Trending <span class="hl">Now</span>', items:MOVIES.slice(0,6).concat(TV_SHOWS.slice(0,2)), types:fill('movie',6).concat(fill('tv',2))},
    {label:'Top <span class="hl">Movies</span>', items:MOVIES, types:fill('movie',MOVIES.length)},
    {label:'Binge-Worthy <span class="hl">Series</span>', items:TV_SHOWS, types:fill('tv',TV_SHOWS.length)},
    {label:'Anime <span class="hl">Picks</span>', items:ANIME, types:fill('anime',ANIME.length)},
  ];
  document.getElementById('rowsWrap').innerHTML = rows.map(function(row, ri) {
    return '<div class="row">'+
      '<div class="row-hdr"><div class="row-title">'+row.label+'</div><span class="row-seeall">See all ›</span></div>'+
      '<div class="track-wrap">'+
        '<button class="arr L" onclick="scrollRow(\'tr'+ri+'\',-1)"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg></button>'+
        '<div class="track" id="tr'+ri+'">'+row.items.map(function(item,i){return cardHTML(item,row.types[i]);}).join('')+'</div>'+
        '<button class="arr R" onclick="scrollRow(\'tr'+ri+'\',1)"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="9,6 15,12 9,18"/></svg></button>'+
      '</div>'+
    '</div>';
  }).join('');
}

function scrollRow(id, dir) { document.getElementById(id).scrollBy({left:dir*620, behavior:'smooth'}); }
function fill(v, n) { var a=[]; for(var i=0;i<n;i++) a.push(v); return a; }

// ═══════════════════════════════════════
//  CARD
// ═══════════════════════════════════════
function cardHTML(item, type) {
  var k = reg(item, type);
  return '<div class="card"><div class="card-in">'+
    '<div class="card-thumb">'+
      '<img src="'+IP+item.poster+'" alt="'+item.title+'" onerror="imgFail(this,\''+item.genre+'\')">'+
      '<div class="card-fb" style="display:none">'+item.title.slice(0,3).toUpperCase()+'<div class="card-fb-tag">'+item.genre+'</div></div>'+
    '</div>'+
    '<div class="card-pop">'+
      '<div class="card-pop-row1">'+
        '<button class="cp-play" onclick="openPlayer(\''+k+'\',null,null)"><svg width="12" height="12" fill="#000" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></button>'+
        '<button class="cp-more" onclick="openDetail(\''+k+'\')"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></button>'+
        '<span class="cp-match">'+item.match+'%</span>'+
        '<button class="cp-add" onclick="toast(\'Added to My List!\')"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>'+
      '</div>'+
      '<div class="card-pop-title">'+item.title+'</div>'+
      '<div class="card-pop-tags">'+
        '<span class="cp-tag">'+item.year+'</span>'+
        '<span class="cp-tag">'+item.genre+'</span>'+
        '<span class="cp-tag">'+item.rating+'</span>'+
      '</div>'+
    '</div>'+
  '</div></div>';
}

function imgFail(img, genre) {
  img.style.display = 'none';
  var fb = img.nextElementSibling;
  if (fb) fb.style.display = 'flex';
}

  if (!r) return;
  renderDetail(r.item, r.type);
}

      '<button class="dp-btn play" onclick="openPlayer(\''+k+'\',null,null)"><svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>Play</button>'+
      '<button class="dp-btn ghost" onclick="toast(\'Added to My List!\')"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>My List</button>'+
      '<button class="dp-btn outline" onclick="toast(\'Shared!\')"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>Share</button>'+
    '</div>';

  // LEFT column
  var left = document.getElementById('dpLeft');
  var html = '';

  // Description
  html += '<div class="dp-section-title">Overview</div>';
  html += '<div class="dp-desc-full">'+item.desc+'</div>';

  // Cast
  if (item.cast && item.cast.length) {
    html += '<div class="dp-section-title">Cast</div>';
    html += '<div class="cast-grid">';
    item.cast.forEach(function(c) {
      var initials = c.name.split(' ').map(function(w){return w[0];}).join('').slice(0,2);
      var avatarHtml = c.img
        ? '<img src="'+IA+c.img+'" alt="'+c.name+'" onerror="this.parentNode.innerHTML=\'<div class=cast-avatar-fb>'+initials+'</div>\'">'
        : '<div class="cast-avatar-fb">'+initials+'</div>';
      html += '<div class="cast-card"><div class="cast-avatar">'+avatarHtml+'</div><div class="cast-name">'+c.name+'</div><div class="cast-role">'+c.role+'</div></div>';
    });
    html += '</div>';
  }

  // Episodes (TV / Anime)
  var hasEps = type==='tv' || (type==='anime' && !item.isMovie);
  if (hasEps) {
    html += '<div class="dp-section-title">Episodes</div>';
    html += '<div class="ep-section">';
    if (type === 'tv' && item.seasons) {
      html += '<div class="season-bar" id="dpSeasonBar">';
      item.seasons.forEach(function(ss) {
        html += '<div class="season-pill'+(ss.s===1?' active':'')+'" onclick="dpSwitchSeason('+ss.s+', this)">Season '+ss.s+'</div>';
      });
      html += '</div>';
    }
    html += '<div class="ep-cards" id="dpEpCards">';
    html += renderEpCards(item, type, 1);
    html += '</div></div>';
  }

  left.innerHTML = html;

  // RIGHT column
  var right = document.getElementById('dpRight');
  var rhtml = '';

  // Info box
  rhtml += '<div class="dp-info-box"><h4>Details</h4>';
  rhtml += '<div class="dp-info-row"><span class="dp-info-label">Director</span><span class="dp-info-val">'+item.director+'</span></div>';
  rhtml += '<div class="dp-info-row"><span class="dp-info-label">Studio</span><span class="dp-info-val">'+item.studio+'</span></div>';
  rhtml += '<div class="dp-info-row"><span class="dp-info-label">Year</span><span class="dp-info-val">'+item.year+'</span></div>';
  rhtml += '<div class="dp-info-row"><span class="dp-info-label">Runtime</span><span class="dp-info-val">'+item.runtime+'</span></div>';
  rhtml += '<div class="dp-info-row"><span class="dp-info-label">Rating</span><span class="dp-info-val">'+item.rating+'</span></div>';
  rhtml += '</div>';

  // Genre tags
  rhtml += '<div class="dp-info-box"><h4>Genres & Tags</h4><div class="genre-tags">';
  rhtml += '<div class="genre-tag">'+item.genre+'</div>';
  item.tags.forEach(function(t){ rhtml += '<div class="genre-tag">'+t+'</div>'; });
  rhtml += '</div></div>';

  // Ratings
  rhtml += '<div class="dp-info-box"><h4>Ratings</h4><div class="rating-display">';
  rhtml += ratingBar('IMDb', item.imdb, 10);
  rhtml += ratingBar('Match', item.match, 100);
  rhtml += '</div></div>';

  // Related
  if (item.related && item.related.length) {
    rhtml += '<div class="dp-info-box"><h4>More Like This</h4><div class="related-grid">';
    item.related.slice(0,4).forEach(function(rid) {
      var found = findItem(rid);
      if (!found) return;
      var ri = found.item, rt = found.type;
      var rk = reg(ri, rt);
      rhtml += '<div class="rel-card" onclick="renderDetail(REG[\''+rk+'\'].item, REG[\''+rk+'\'].type)">'+
        '<div class="rel-thumb"><img src="'+IP+ri.poster+'" alt="'+ri.title+'" onerror="this.style.display=\'none\'"></div>'+
        '<div class="rel-info"><div class="rel-title">'+ri.title+'</div><div class="rel-year">'+ri.year+' · '+ri.genre+'</div></div>'+
      '</div>';
    });
    rhtml += '</div></div>';
  }

  right.innerHTML = rhtml;

  // Animate rating bars
  setTimeout(function() {
    document.querySelectorAll('.rating-fill').forEach(function(el) {
      el.style.width = el.dataset.w;
    });
  }, 100);
}

function ratingBar(label, val, max) {
  var pct = Math.round((parseFloat(val) / max) * 100);
  return '<div class="rating-bar">'+
    '<span class="rating-label">'+label+'</span>'+
    '<div class="rating-track"><div class="rating-fill" style="width:0%" data-w="'+pct+'%"></div></div>'+
    '<span class="rating-val">'+val+'</span>'+
  '</div>';
}

function renderEpCards(item, type, season) {
  var eps = type==='tv' ? (item.seasons.filter(function(s){return s.s===season;})[0]||{episodes:[]}).episodes : item.episodes;
  return eps.map(function(ep) {
    var wkey = type==='tv' ? 'tv-'+item.id+'-s'+season+'e'+ep.e : 'anime-'+item.id+'-e'+ep.e;
    var k = reg(item, type);
    return '<div class="ep-card'+(watched[wkey]?' playing':'')+'" onclick="openPlayerEp(\''+k+'\','+(type==='tv'?season:'null')+','+ep.e+')">'+
      '<div class="ep-num">'+ep.e+'</div>'+
      '<div class="ep-thumb">'+
        '<div class="ep-thumb-play"><svg width="20" height="20" fill="white" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>'+
      '</div>'+
      '<div class="ep-info">'+
        '<div class="ep-info-title">'+ep.name+'</div>'+
        '<div class="ep-info-meta">'+ep.dur+(type==='tv'?' · Season '+season:'')+'</div>'+
        (ep.desc ? '<div class="ep-info-desc">'+ep.desc+'</div>' : '')+
      '</div>'+
      (watched[wkey] ? '<div class="ep-progress"><div class="ep-watched-dot"></div></div>' : '')+
    '</div>';
  }).join('');
}

function dpSwitchSeason(s, btn) {
  document.querySelectorAll('.season-pill').forEach(function(p){ p.classList.remove('active'); });
  btn.classList.add('active');
  if (curItem) {
    document.getElementById('dpEpCards').innerHTML = renderEpCards(curItem, curType, s);
  }
}

// ═══════════════════════════════════════
//  PLAYER
// ═══════════════════════════════════════
function openPlayer(k, s, ep) {
  var r = REG[k];
  if (!r) return;
  openPlayerDirect(r.item, r.type, s, ep);
}

function openPlayerEp(k, s, ep) {
  var r = REG[k];
  if (!r) return;
  openPlayerDirect(r.item, r.type, s, ep);
}

function openPlayerDirect(item, type, s, ep) {
  prevPage = document.querySelector('.page.active').id;
  curItem = item; curType = type;
  curSeason = s || (item.seasons ? item.seasons[0].s : 1);
  if (s==null && ep==null) {
    if (type==='tv'){ s=item.seasons[0].s; ep=item.seasons[0].episodes[0].e; }
    else if (type==='anime' && !item.isMovie){ ep=item.episodes[0].e; }
  }
  curEp = s ? {s:s,e:ep} : ep ? {e:ep} : null;

  showPage('player-page');
  document.getElementById('playerTitleBar').textContent = item.title + (s&&ep ? ' · S'+s+'E'+ep : '');
  document.getElementById('playerBackBtn').onclick = function() {
    document.getElementById('playerFrameWrap').innerHTML = '';
    showPage(prevPage);
  };
  document.getElementById('playerFrameWrap').innerHTML =
    '<iframe src="'+buildSrc(type,item,s,ep)+'" frameborder="0" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture; fullscreen"></iframe>';

  // PIP Left
  var pipL = document.getElementById('pipLeft');
  pipL.innerHTML =
    '<div class="pip-title">'+item.title+'</div>'+
    '<div class="pip-meta">'+
      '<span class="green">'+item.match+'% Match</span>'+
      '<span>'+item.year+'</span>'+
      '<span>'+item.rating+'</span>'+
      '<span>'+item.genre+'</span>'+
      (s&&ep ? '<span>Season '+s+', Episode '+ep+'</span>' : '')+
    '</div>'+
    '<div class="pip-desc">'+item.desc+'</div>'+
    '<div class="pip-progress-wrap">'+
      '<div class="pip-prog-hdr"><span class="pip-prog-label">Watch Progress</span><span class="pip-prog-pct" id="pipPct">0%</span></div>'+
      '<div class="pip-prog-bar"><div class="pip-prog-fill" id="pipFill"></div></div>'+
      '<div class="pip-prog-time" id="pipTime">-</div>'+
    '</div>';

  // PIP Right (episode panel)
  var pipR = document.getElementById('pipRight');
  var hasEps = type==='tv' || (type==='anime' && !item.isMovie);
  if (hasEps) {
    var stabs = '';
    if (type==='tv' && item.seasons) {
      stabs = item.seasons.map(function(ss){
        return '<div class="pip-stab'+(ss.s===curSeason?' active':'')+'" onclick="pipSwitchSeason('+ss.s+', this)">S'+ss.s+'</div>';
      }).join('');
    }
    pipR.innerHTML =
      '<div class="pip-ep-title">Episodes</div>'+
      (stabs ? '<div class="pip-stabs" id="pipStabs">'+stabs+'</div>' : '')+
      '<div class="pip-ep-list" id="pipEpList"></div>';
    renderPipEps();
  } else {
    pipR.innerHTML = '';
  }

  resetProgress();
}

function buildSrc(type, item, s, ep) {
  var p = '?color=E50914&episodeSelector=true';
  if (type==='movie') return 'https://player.videasy.net/movie/'+item.id+p;
  if (type==='tv') return 'https://player.videasy.net/tv/'+item.id+'/'+s+'/'+ep+p;
  if (type==='anime') {
    if (item.isMovie) return 'https://player.videasy.net/anime/'+item.id+p;
    return 'https://player.videasy.net/anime/'+item.id+'/'+ep+p;
  }
}

function renderPipEps() {
  var list = document.getElementById('pipEpList');
  if (!list || !curItem) return;
  var eps = curType==='tv'
    ? (curItem.seasons.filter(function(ss){return ss.s===curSeason;})[0]||{episodes:[]}).episodes.map(function(e){return Object.assign({},e,{s:curSeason});})
    : curItem.episodes;
  list.innerHTML = eps.map(function(ep) {
    var wkey = curType==='tv' ? 'tv-'+curItem.id+'-s'+(ep.s||curSeason)+'e'+ep.e : 'anime-'+curItem.id+'-e'+ep.e;
    var isA = curEp && curEp.e===ep.e && (!ep.s||curEp.s===ep.s);
    var isW = watched[wkey];
    var k = reg(curItem, curType);
    return '<div class="pip-ep-item'+(isA?' active':'')+(isW?' watched':'')+'" onclick="pipPlayEp(\''+k+'\','+(ep.s||'null')+','+ep.e+')">'+
      '<div class="pip-ep-n">'+ep.e+'</div>'+
      '<div class="pip-ep-d"><div class="pip-ep-name">'+ep.name+'</div><div class="pip-ep-dur">'+ep.dur+'</div></div>'+
      '<div class="pip-ep-dot"></div>'+
    '</div>';
  }).join('');
}

function pipSwitchSeason(s, btn) {
  curSeason = s;
  document.querySelectorAll('.pip-stab').forEach(function(t){t.classList.remove('active');});
  btn.classList.add('active');
  renderPipEps();
}

function pipPlayEp(k, s, ep) {
  var r = REG[k]; if (!r) return;
  curEp = s ? {s:s,e:ep} : {e:ep};
  document.getElementById('playerFrameWrap').innerHTML =
    '<iframe src="'+buildSrc(r.type,r.item,s,ep)+'" frameborder="0" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture; fullscreen"></iframe>';
  var tb = document.getElementById('playerTitleBar');
  tb.textContent = r.item.title + (s ? ' · S'+s+'E'+ep : ' · Ep'+ep);
  renderPipEps();
  resetProgress();
}

// ═══════════════════════════════════════
//  PROGRESS
// ═══════════════════════════════════════
function onProgress(e) {
  try {
    var d = JSON.parse(e.data);
    if (d.progress !== undefined) {
      var pct = Math.round(d.progress);
      var pctEl = document.getElementById('pipPct');
      var fillEl = document.getElementById('pipFill');
      var timeEl = document.getElementById('pipTime');
      if (pctEl) pctEl.textContent = pct + '%';
      if (fillEl) fillEl.style.width = pct + '%';
      if (timeEl && d.timestamp && d.duration) timeEl.textContent = fmt(d.timestamp)+' / '+fmt(d.duration);
      if (pct > 80) markWatched();
    }
  } catch(err) {}
}

function markWatched() {
  if (!curItem || !curEp) return;
  var key = curType==='tv' ? 'tv-'+curItem.id+'-s'+curEp.s+'e'+curEp.e : 'anime-'+curItem.id+'-e'+curEp.e;
  if (!watched[key]) { watched[key]=true; renderPipEps(); }
}

function resetProgress() {
  var p=document.getElementById('pipPct'), f=document.getElementById('pipFill'), t=document.getElementById('pipTime');
  if(p) p.textContent='0%';
  if(f) f.style.width='0%';
  if(t) t.textContent='-';
}

function fmt(s) {
  if(!s) return '0:00';
  var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60);
  return h ? h+':'+pad(m)+':'+pad(sec) : m+':'+pad(sec);
}
function pad(n) { return n<10?'0'+n:''+n; }

// ═══════════════════════════════════════
//  SECTIONS
// ═══════════════════════════════════════
function setSection(sec, btn) {
  curSection = sec;
  document.querySelectorAll('.nl').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  showPage('home-page');
  var rw = document.getElementById('rowsWrap');
  if (sec === 'home') {
    renderBillboard(MOVIES[0], 'movie');
    renderRows();
  } else if (sec === 'movies') {
    renderBillboard(MOVIES[6], 'movie');
    rw.innerHTML = '<div class="row"><div class="row-hdr"><div class="row-title">All <span class="hl">Movies</span></div></div><div class="track-wrap"><div class="track">'+MOVIES.map(function(m){return cardHTML(m,'movie');}).join('')+'</div></div></div>';
  } else if (sec === 'tvshows') {
    renderBillboard(TV_SHOWS[1], 'tv');
    rw.innerHTML = '<div class="row"><div class="row-hdr"><div class="row-title">All <span class="hl">TV Shows</span></div></div><div class="track-wrap"><div class="track">'+TV_SHOWS.map(function(s){return cardHTML(s,'tv');}).join('')+'</div></div></div>';
  } else if (sec === 'anime') {
    renderBillboard(ANIME[5], 'anime');
    rw.innerHTML = '<div class="row"><div class="row-hdr"><div class="row-title">All <span class="hl">Anime</span></div></div><div class="track-wrap"><div class="track">'+ANIME.map(function(a){return cardHTML(a,'anime');}).join('')+'</div></div></div>';
  }
}

// ═══════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════
function openSearch() {
  document.getElementById('so').classList.add('open');
  setTimeout(function(){document.getElementById('soInput').focus();}, 60);
}
function closeSearch() {
  document.getElementById('so').classList.remove('open');
  document.getElementById('soInput').value = '';
  document.getElementById('soResults').innerHTML = '';
}
function soClick(e) { if(e.target===document.getElementById('so')) closeSearch(); }

function doSearch(q) {
  q = q.toLowerCase().trim();
  var res = document.getElementById('soResults');
  if (!q) { res.innerHTML=''; return; }
  var all = MOVIES.map(function(m){return Object.assign({},m,{_t:'movie'});})
    .concat(TV_SHOWS.map(function(s){return Object.assign({},s,{_t:'tv'});}))
    .concat(ANIME.map(function(a){return Object.assign({},a,{_t:'anime'});}))
    .filter(function(i){ return i.title.toLowerCase().indexOf(q)!==-1 || i.genre.toLowerCase().indexOf(q)!==-1; });
  if (!all.length) { res.innerHTML='<div style="text-align:center;color:var(--text3);padding:2rem;font-size:.85rem">No results found</div>'; return; }
  res.innerHTML = all.map(function(item) {
    var k = reg(item, item._t);
    var tl = item._t==='movie'?'Movie':item._t==='tv'?'TV Show':'Anime';
    return '<div class="so-item" onclick="soSelect(\''+k+'\')">'+
      '<div class="so-thumb"><img src="'+IP+item.poster+'" alt="'+item.title+'" onerror="this.parentNode.innerHTML=\'<div class=so-thumb-fb>'+item.title.slice(0,2)+'</div>\'"></div>'+
      '<div class="so-info"><div class="so-name">'+item.title+'</div><div class="so-sub">'+item.year+' · '+item.genre+' · ★ '+item.imdb+'</div></div>'+
      '<div class="so-type">'+tl+'</div>'+
    '</div>';
  }).join('');
}

function soSelect(k) {
  closeSearch();
  openDetail(k);
}

// ═══════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════
var _tt;
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(function(){ t.classList.remove('show'); }, 2400);
}

init();
</script>
<script>
// Apply data.js overrides if loaded
if (typeof __SV_MOVIES !== "undefined") MOVIES = __SV_MOVIES;
if (typeof __SV_TV !== "undefined") TV_SHOWS = __SV_TV;
if (typeof __SV_ANIME !== "undefined") ANIME = __SV_ANIME;
</script>
</body>
</html>
